<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | WealthVault</title>
    <style>
        body { background: #000; color: #00ffa3; font-family: sans-serif; padding: 20px; text-align: center; }
        .box { max-width: 400px; margin: auto; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #1a1a1a; }
        input, select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        button { background: #00ffa3; color: black; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>PORTFOLIO MANAGER</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Asset Name (e.g. Bitcoin)" required>
            <input type="text" name="title" placeholder="Description" required>
            <input type="text" name="company" placeholder="Price/Value" required>
            <select name="status"><option value="+0.0%">Growth (+)</option><option value="-0.0%">Loss (-)</option></select>
            <button type="submit">UPDATE PORTFOLIO</button>
        </form>
        <br><a href="/" style="color: #666; text-decoration: none; font-size: 12px;">View Public Dashboard →</a>
    </div>
</body>
</html>
