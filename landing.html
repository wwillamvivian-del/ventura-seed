<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Investment | Private</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        /* THE FLOWING HEADER */
        .top-nav {
            width: 100%; padding: 18px 22px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid #161616; z-index: 100;
        }
        .greeting { font-size: 18px; font-weight: 700; color: #fff; }
        .greeting span { color: #a855f7; } /* Purple accent from your logo */

        .nav-icons { display: flex; gap: 15px; }
        .icon { width: 34px; height: 34px; background: #0a0a0a; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }

        /* HERO CONTENT */
        .hero { padding: 70px 25px; text-align: center; max-width: 480px; }
        .hero-title { font-size: 40px; font-weight: 700; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 15px; }
        
        .search-preview {
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 100px;
            padding: 14px 20px; margin: 35px 0; display: flex; align-items: center;
            color: #555; font-size: 14px; text-align: left;
        }

        .btn-enter { 
            background: #fff; color: #000; padding: 16px 0; width: 100%; border-radius: 12px; 
            font-weight: 700; text-decoration: none; display: block;
            transition: 0.3s;
        }
        .btn-enter:hover { background: #a855f7; color: #fff; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div class="greeting">Good evening, <span>Partner</span></div>
        <div class="nav-icons">
            <div class="icon">🔔</div>
            <div class="icon">👤</div>
        </div>
    </div>

    <div class="hero">
        <div class="hero-title">Your infrastructure for wealth production.</div>
        <p style="color: #666; line-height: 1.5; font-size: 16px;">Securely manage and track your private distribution networks and lead assets.</p>
        
        <div class="search-preview">
            🔍 Search for market assets...
        </div>

        <a href="/login" class="btn-enter">Sign in to Tesla</a>
    </div>
</body>
</html>
