<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthVault | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen font-sans p-6">

    <div class="mt-8 mb-2">
        <p class="text-gray-400 text-lg font-medium">Your balance</p>
    </div>

    <div class="flex items-center gap-4 mb-12">
        <h1 class="text-5xl font-bold tracking-tight">${{ "{:,.2f}".format(user.balance) }}</h1>
        <svg width="80" height="40" viewBox="0 0 80 40" fill="none" class="mt-2">
            <path d="M2 30C15 35 25 15 40 25C55 35 65 5 78 12" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
        </svg>
    </div>

    <div class="flex justify-between items-start mb-12 gap-2">
        <a href="/buy" class="flex flex-col items-center gap-2">
            <div class="w-14 h-14 bg-[#2563EB] rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-plus text-white text-xl"></i>
            </div>
            <span class="text-xs font-medium text-gray-400">Buy</span>
        </a>

        <div class="flex flex-col items-center gap-2 opacity-50">
            <div class="w-14 h-14 bg-[#2563EB] rounded-full flex items-center justify-center">
                <i class="fas fa-minus text-white text-xl"></i>
            </div>
            <span class="text-xs font-medium text-gray-400">Sell</span>
        </div>

        <div class="flex flex-col items-center gap-2 opacity-50">
            <div class="w-14 h-14 bg-[#2563EB] rounded-full flex items-center justify-center">
                <i class="fas fa-arrow-up text-white text-xl"></i>
            </div>
            <span class="text-xs font-medium text-gray-400">Send</span>
        </div>

        <div class="flex flex-col items-center gap-2 opacity-50">
            <div class="w-14 h-14 bg-[#2563EB] rounded-full flex items-center justify-center">
                <i class="fas fa-arrow-down text-white text-xl"></i>
            </div>
            <span class="text-xs font-medium text-gray-400">Receive</span>
        </div>

        <div class="flex flex-col items-center gap-2 opacity-50">
            <div class="w-14 h-14 bg-[#2563EB] rounded-full flex items-center justify-center">
                <i class="fas fa-ellipsis-h text-white text-xl"></i>
            </div>
            <span class="text-xs font-medium text-gray-400">More</span>
        </div>
    </div>

    <div class="mt-10">
        <h2 class="text-2xl font-bold mb-6">Watchlist</h2>
        <div class="bg-[#1a1a1a] rounded-3xl p-5 border border-white/5">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-orange-500/10 text-orange-500 rounded-full flex items-center justify-center">
                        <i class="fab fa-bitcoin text-2xl"></i>
                    </div>
                    <div>
                        <p class="font-bold">Bitcoin</p>
                        <p class="text-xs text-gray-500">BTC</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="font-bold">$68,432.10</p>
                    <p class="text-green-500 text-xs">+3.77%</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
